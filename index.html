<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopNest — Product Catalog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0f0e17;
    --paper: #f8f7f4;
    --accent: #ff5733;
    --accent2: #ffd166;
    --muted: #6b6b7b;
    --card: #ffffff;
    --border: #e8e6e0;
    --tag-bg: #fffaf0;
    --success: #06d6a0;
    --radius: 14px;
    --shadow: 0 4px 24px rgba(15,14,23,0.08);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(248,247,244,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 64px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 1.4rem;
    color: var(--ink);
    text-decoration: none;
    display: flex; align-items: center; gap: 8px;
  }
  .logo span { color: var(--accent); }
  .logo-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; display: inline-block; }

  nav { display: flex; gap: 6px; }
  nav a {
    font-size: 0.82rem; font-weight: 500;
    color: var(--muted);
    text-decoration: none;
    padding: 6px 14px;
    border-radius: 30px;
    transition: all 0.2s;
    cursor: pointer;
  }
  nav a.active, nav a:hover { color: var(--ink); background: var(--border); }
  nav a.active { color: var(--accent); background: #fff0ec; }

  .header-right { display: flex; align-items: center; gap: 12px; }
  .cart-btn {
    position: relative;
    background: var(--ink);
    color: #fff;
    border: none;
    padding: 8px 18px;
    border-radius: 30px;
    font-family: 'Inter', sans-serif;
    font-weight: 500; font-size: 0.85rem;
    cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    transition: background 0.2s;
  }
  .cart-btn:hover { background: var(--accent); }
  .cart-count {
    background: var(--accent);
    color: #fff;
    font-size: 0.7rem; font-weight: 700;
    width: 18px; height: 18px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
  }
  .cart-count.bump { transform: scale(1.4); }

  /* ── VIEWS ── */
  .view { display: none; animation: fadeIn 0.3s ease; }
  .view.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

  /* ── HOME ── */
  .hero {
    padding: 60px 24px 40px;
    max-width: 900px; margin: 0 auto;
    text-align: center;
  }
  .hero-tag {
    display: inline-block;
    font-size: 0.75rem; font-weight: 600; letter-spacing: 0.08em;
    color: var(--accent); text-transform: uppercase;
    background: #fff0ec; padding: 4px 14px; border-radius: 20px;
    margin-bottom: 20px;
  }
  .hero h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2.4rem, 6vw, 4.2rem);
    font-weight: 800; line-height: 1.08;
    letter-spacing: -0.02em;
    margin-bottom: 18px;
  }
  .hero h1 em { font-style: normal; color: var(--accent); }
  .hero p {
    font-size: 1.05rem; color: var(--muted);
    max-width: 480px; margin: 0 auto 32px;
    line-height: 1.7;
  }
  .hero-cta {
    display: inline-flex; align-items: center; gap: 10px;
    background: var(--ink); color: #fff;
    border: none; border-radius: 50px;
    padding: 14px 30px;
    font-family: 'Inter', sans-serif; font-weight: 600; font-size: 0.95rem;
    cursor: pointer; transition: all 0.2s;
  }
  .hero-cta:hover { background: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,87,51,0.3); }

  .stats-row {
    display: flex; justify-content: center; gap: 48px;
    padding: 40px 24px;
    border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
    margin: 0 24px;
  }
  .stat { text-align: center; }
  .stat-num {
    font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800;
    color: var(--ink);
  }
  .stat-label { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }

  /* ── CATALOG ── */
  .catalog-header {
    padding: 32px 24px 16px;
    max-width: 1200px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
  }
  .catalog-header h2 {
    font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 700;
  }
  .filter-row {
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .filter-btn {
    font-size: 0.8rem; font-weight: 500;
    padding: 6px 16px; border-radius: 30px;
    border: 1.5px solid var(--border);
    background: #fff; color: var(--muted);
    cursor: pointer; transition: all 0.18s;
  }
  .filter-btn.active, .filter-btn:hover {
    border-color: var(--ink); color: var(--ink); background: var(--ink); color: #fff;
  }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); }

  .search-wrap {
    padding: 0 24px 24px;
    max-width: 1200px; margin: 0 auto;
  }
  .search-input {
    width: 100%; max-width: 360px;
    padding: 10px 18px;
    border: 1.5px solid var(--border);
    border-radius: 30px;
    font-family: 'Inter', sans-serif; font-size: 0.9rem;
    background: #fff; color: var(--ink);
    outline: none; transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 20px;
    padding: 0 24px 48px;
    max-width: 1200px; margin: 0 auto;
  }

  .card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    transition: transform 0.22s, box-shadow 0.22s;
    cursor: pointer;
  }
  .card:hover { transform: translateY(-4px); box-shadow: var(--shadow); }

  .card-img {
    width: 100%; aspect-ratio: 1/1;
    display: flex; align-items: center; justify-content: center;
    font-size: 3.5rem;
    position: relative;
    overflow: hidden;
  }
  .card-badge {
    position: absolute; top: 10px; left: 10px;
    background: var(--accent); color: #fff;
    font-size: 0.68rem; font-weight: 700; letter-spacing: 0.05em;
    padding: 3px 10px; border-radius: 20px;
    text-transform: uppercase;
  }
  .card-badge.new { background: var(--success); }
  .card-badge.sale { background: var(--accent); }

  .card-body { padding: 16px; }
  .card-cat {
    font-size: 0.72rem; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.07em;
    margin-bottom: 4px;
  }
  .card-name {
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem;
    margin-bottom: 4px; line-height: 1.3;
  }
  .card-rating { font-size: 0.8rem; color: #f59e0b; margin-bottom: 10px; }
  .card-footer {
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-price {
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.15rem;
  }
  .card-price .old { font-size: 0.8rem; color: var(--muted); text-decoration: line-through; font-weight: 400; font-family: 'Inter', sans-serif; }
  .add-btn {
    background: var(--ink); color: #fff;
    border: none; border-radius: 30px;
    padding: 7px 16px; font-size: 0.8rem; font-weight: 600;
    cursor: pointer; transition: background 0.2s;
    font-family: 'Inter', sans-serif;
  }
  .add-btn:hover { background: var(--accent); }

  /* ── PRODUCT DETAIL ── */
  .detail-wrap {
    max-width: 900px; margin: 0 auto;
    padding: 32px 24px 60px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 40px;
  }
  @media (max-width: 600px) { .detail-wrap { grid-template-columns: 1fr; } }

  .detail-img {
    background: #fff; border: 1px solid var(--border);
    border-radius: var(--radius);
    aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center;
    font-size: 7rem;
  }
  .detail-info { display: flex; flex-direction: column; gap: 14px; }
  .detail-cat { font-size: 0.75rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; }
  .detail-name { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; line-height: 1.2; }
  .detail-rating { font-size: 0.9rem; color: #f59e0b; }
  .detail-price { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; color: var(--accent); }
  .detail-desc { font-size: 0.92rem; color: var(--muted); line-height: 1.7; }
  .detail-tags { display: flex; gap: 8px; flex-wrap: wrap; }
  .tag {
    background: var(--tag-bg); border: 1px solid var(--border);
    color: var(--muted); font-size: 0.76rem; padding: 4px 12px;
    border-radius: 20px;
  }
  .detail-add {
    background: var(--ink); color: #fff;
    border: none; border-radius: 50px;
    padding: 14px 32px; font-size: 1rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
    font-family: 'Inter', sans-serif;
    display: flex; align-items: center; gap: 8px; width: fit-content;
  }
  .detail-add:hover { background: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,87,51,0.3); }
  .back-btn {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--muted); font-size: 0.85rem;
    background: none; border: none; cursor: pointer;
    padding: 24px 24px 0;
    font-family: 'Inter', sans-serif;
    transition: color 0.2s;
  }
  .back-btn:hover { color: var(--ink); }

  /* ── CART ── */
  .cart-wrap {
    max-width: 720px; margin: 0 auto;
    padding: 32px 24px 60px;
  }
  .cart-wrap h2 { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; margin-bottom: 24px; }
  .cart-empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .cart-empty p { font-size: 1.1rem; margin-top: 12px; }

  .cart-item {
    display: flex; align-items: center; gap: 16px;
    background: #fff; border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px;
    margin-bottom: 12px;
  }
  .cart-item-icon { font-size: 2.2rem; width: 56px; text-align: center; }
  .cart-item-info { flex: 1; }
  .cart-item-name { font-family: 'Syne', sans-serif; font-weight: 700; }
  .cart-item-cat { font-size: 0.78rem; color: var(--muted); }
  .cart-item-price { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.1rem; color: var(--accent); }
  .qty-ctrl { display: flex; align-items: center; gap: 10px; }
  .qty-btn {
    width: 28px; height: 28px; border-radius: 50%;
    border: 1.5px solid var(--border); background: #fff;
    font-size: 1rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; font-weight: 600;
  }
  .qty-btn:hover { border-color: var(--ink); background: var(--ink); color: #fff; }
  .qty-num { font-weight: 600; min-width: 20px; text-align: center; }
  .remove-btn {
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 1.1rem; padding: 4px;
    transition: color 0.15s;
  }
  .remove-btn:hover { color: var(--accent); }

  .cart-summary {
    background: #fff; border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px;
    margin-top: 20px;
  }
  .summary-row {
    display: flex; justify-content: space-between;
    font-size: 0.9rem; color: var(--muted); margin-bottom: 10px;
  }
  .summary-total {
    display: flex; justify-content: space-between;
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.3rem;
    padding-top: 10px; border-top: 1px solid var(--border);
    margin-top: 10px;
  }
  .checkout-btn {
    width: 100%; margin-top: 16px;
    background: var(--accent); color: #fff;
    border: none; border-radius: 50px; padding: 15px;
    font-family: 'Inter', sans-serif; font-weight: 700; font-size: 1rem;
    cursor: pointer; transition: all 0.2s;
  }
  .checkout-btn:hover { background: #e0401f; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,87,51,0.3); }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 999;
    background: var(--ink); color: #fff;
    padding: 12px 22px; border-radius: 30px;
    font-size: 0.88rem; font-weight: 500;
    transform: translateY(80px); opacity: 0;
    transition: all 0.35s cubic-bezier(.34,1.56,.64,1);
    pointer-events: none;
  }
  .toast.show { transform: none; opacity: 1; }

  /* ── NO RESULTS ── */
  .no-results { text-align: center; padding: 60px 20px; color: var(--muted); grid-column: 1/-1; }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .stats-row { gap: 24px; }
    nav a { padding: 6px 10px; font-size: 0.78rem; }
    .logo { font-size: 1.15rem; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; }
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="#" onclick="navigate('home')">
    Shop<span>Nest</span>
  </a>
  <nav>
    <a onclick="navigate('home')" id="nav-home" class="active">Home</a>
    <a onclick="navigate('catalog')" id="nav-catalog">Shop</a>
    <a onclick="navigate('cart')" id="nav-cart">Cart</a>
  </nav>
  <div class="header-right">
    <button class="cart-btn" onclick="navigate('cart')">
      🛒 Cart <span class="cart-count" id="cart-count">0</span>
    </button>
  </div>
</header>

<!-- HOME VIEW -->
<div id="view-home" class="view active">
  <div class="hero">
    <div class="hero-tag">New Arrivals Just Dropped</div>
    <h1>Find what you <em>actually</em> want.</h1>
    <p>ShopNest curates quality products across tech, fashion, home, and more — without the noise.</p>
    <button class="hero-cta" onclick="navigate('catalog')">Browse Catalog <span>→</span></button>
  </div>
  <div class="stats-row">
    <div class="stat"><div class="stat-num">240+</div><div class="stat-label">Products</div></div>
    <div class="stat"><div class="stat-num">18</div><div class="stat-label">Categories</div></div>
    <div class="stat"><div class="stat-num">4.8★</div><div class="stat-label">Avg Rating</div></div>
    <div class="stat"><div class="stat-num">Free</div><div class="stat-label">Shipping over ₹999</div></div>
  </div>
</div>

<!-- CATALOG VIEW -->
<div id="view-catalog" class="view">
  <div class="catalog-header">
    <h2>All Products</h2>
    <div class="filter-row" id="filters"></div>
  </div>
  <div class="search-wrap">
    <input class="search-input" id="search" placeholder="Search products…" oninput="renderGrid()" />
  </div>
  <div class="grid" id="grid"></div>
</div>

<!-- DETAIL VIEW -->
<div id="view-detail" class="view">
  <button class="back-btn" onclick="navigate('catalog')">← Back to Catalog</button>
  <div class="detail-wrap" id="detail-content"></div>
</div>

<!-- CART VIEW -->
<div id="view-cart" class="view">
  <div class="cart-wrap">
    <h2>Your Cart</h2>
    <div id="cart-content"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const PRODUCTS = [
  { id:1,  name:'Wireless ANC Headphones', cat:'Electronics', emoji:'🎧', price:3499, old:4999, rating:4.8, badge:'sale', desc:'Studio-grade sound with active noise cancellation. 30-hour battery, USB-C fast charge, foldable design.', tags:['wireless','audio','bluetooth'] },
  { id:2,  name:'Mechanical Keyboard', cat:'Electronics', emoji:'⌨️', price:2999, rating:4.6, badge:'new', desc:'Tactile clicky switches, RGB backlit, compact TKL layout. Compatible with Windows and macOS.', tags:['keyboard','gaming','rgb'] },
  { id:3,  name:'Smart Watch Pro', cat:'Electronics', emoji:'⌚', price:5999, old:7499, rating:4.7, badge:'sale', desc:'AMOLED display, SpO2 sensor, GPS, 7-day battery. Water-resistant up to 50m.', tags:['wearable','health','gps'] },
  { id:4,  name:'USB-C Hub 7-in-1', cat:'Electronics', emoji:'🔌', price:1299, rating:4.5, desc:'HDMI 4K, 3×USB-A, SD card, PD charging 100W. Works with laptops and tablets.', tags:['accessories','usb-c','hub'] },
  { id:5,  name:'Minimalist Backpack', cat:'Fashion', emoji:'🎒', price:1799, rating:4.4, badge:'new', desc:'30L water-resistant nylon, padded laptop sleeve, hidden anti-theft pocket. Fits 15.6" laptops.', tags:['bag','travel','laptop'] },
  { id:6,  name:'Classic Sneakers', cat:'Fashion', emoji:'👟', price:2499, old:3299, rating:4.6, badge:'sale', desc:'Vulcanized rubber sole, canvas upper, orthopaedic insole. Available in 8 colorways.', tags:['shoes','casual','comfort'] },
  { id:7,  name:'Leather Wallet', cat:'Fashion', emoji:'👛', price:699, rating:4.3, desc:'Slim RFID-blocking genuine leather wallet. 6 card slots, 2 cash pockets. Gift-box included.', tags:['leather','rfid','slim'] },
  { id:8,  name:'Sunglasses UV400', cat:'Fashion', emoji:'🕶️', price:899, rating:4.5, badge:'new', desc:'Polarized UV400 lenses, lightweight TR90 frame, spring hinges. Includes case and cloth.', tags:['eyewear','uv','polarized'] },
  { id:9,  name:'Ceramic Pour-Over Set', cat:'Home', emoji:'☕', price:1199, rating:4.9, desc:'Matte ceramic dripper, matching carafe, stainless mesh filter. Brews 2–4 cups. Dishwasher-safe.', tags:['coffee','kitchen','ceramic'] },
  { id:10, name:'Bamboo Desk Organiser', cat:'Home', emoji:'🖊️', price:549, rating:4.4, desc:'Eco-friendly bamboo, 5 compartments, anti-slip base. Ideal for home offices and study desks.', tags:['desk','bamboo','eco'] },
  { id:11, name:'LED Smart Bulb (4-pack)', cat:'Home', emoji:'💡', price:999, rating:4.6, badge:'new', desc:'16M colours, voice control (Alexa & Google), 800 lm, E27 fit. App-controlled schedules.', tags:['smart','led','home-automation'] },
  { id:12, name:'Yoga Mat Pro', cat:'Sports', emoji:'🧘', price:1499, old:1999, rating:4.7, badge:'sale', desc:'6mm thick TPE, non-slip texture both sides, carry strap included. 183×61 cm, 1.2 kg.', tags:['yoga','fitness','eco-tpe'] },
  { id:13, name:'Resistance Band Set', cat:'Sports', emoji:'🏋️', price:649, rating:4.5, desc:'5 levels (10–50 lbs), latex-free, door anchor + handles + ankle straps included.', tags:['gym','resistance','home-workout'] },
  { id:14, name:'Running Bottle 750ml', cat:'Sports', emoji:'🚴', price:399, rating:4.3, badge:'new', desc:'BPA-free Tritan, leak-proof flip lid, wide mouth for ice. Dishwasher-safe. Fits most cages.', tags:['hydration','running','bpa-free'] },
  { id:15, name:'Sketchbook A4 80pg', cat:'Books & Art', emoji:'📒', price:249, rating:4.6, desc:'160gsm cold-press acid-free paper, lay-flat binding. Suitable for pencil, ink, and light wash.', tags:['art','drawing','stationery'] },
  { id:16, name:'Watercolour Set 24', cat:'Books & Art', emoji:'🎨', price:799, rating:4.8, badge:'new', desc:'24 vibrant pigments, travel tin, 2 brushes, mixing palette. Professional and beginner-friendly.', tags:['painting','art','travel'] },
];

const CATEGORIES = ['All', ...new Set(PRODUCTS.map(p => p.cat))];

// ── STATE ─────────────────────────────────────────────────────────────────────
let currentView = 'home';
let activeFilter = 'All';
let cart = {};   // id → qty

// ── ROUTING ──────────────────────────────────────────────────────────────────
function navigate(view, id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));

  currentView = view;
  const el = document.getElementById('view-' + view);
  if (el) { el.classList.add('active'); }
  const navEl = document.getElementById('nav-' + (view === 'detail' ? 'catalog' : view));
  if (navEl) navEl.classList.add('active');

  if (view === 'catalog') renderGrid();
  if (view === 'cart') renderCart();
  if (view === 'detail' && id) renderDetail(id);
  window.scrollTo(0, 0);
}

// ── FILTERS ───────────────────────────────────────────────────────────────────
function buildFilters() {
  const wrap = document.getElementById('filters');
  wrap.innerHTML = CATEGORIES.map(cat => `
    <button class="filter-btn ${cat === activeFilter ? 'active' : ''}"
      onclick="setFilter('${cat}')">${cat}</button>
  `).join('');
}

function setFilter(cat) {
  activeFilter = cat;
  buildFilters();
  renderGrid();
}

// ── GRID ──────────────────────────────────────────────────────────────────────
function renderGrid() {
  buildFilters();
  const q = (document.getElementById('search')?.value || '').toLowerCase();
  let products = PRODUCTS;
  if (activeFilter !== 'All') products = products.filter(p => p.cat === activeFilter);
  if (q) products = products.filter(p =>
    p.name.toLowerCase().includes(q) ||
    p.cat.toLowerCase().includes(q) ||
    p.tags.some(t => t.includes(q))
  );

  const grid = document.getElementById('grid');
  if (!products.length) {
    grid.innerHTML = `<div class="no-results">😕 No products found for "<strong>${q}</strong>"</div>`;
    return;
  }

  const bg = cat => ({'Electronics':'#eef2ff','Fashion':'#fdf2f8','Home':'#f0fdf4','Sports':'#fff7ed','Books & Art':'#fffbeb'}[cat] || '#f8f8f8');

  grid.innerHTML = products.map(p => `
    <div class="card" onclick="navigate('detail', ${p.id})">
      <div class="card-img" style="background:${bg(p.cat)}">
        ${p.badge ? `<div class="card-badge ${p.badge}">${p.badge === 'new' ? 'New' : 'Sale'}</div>` : ''}
        ${p.emoji}
      </div>
      <div class="card-body">
        <div class="card-cat">${p.cat}</div>
        <div class="card-name">${p.name}</div>
        <div class="card-rating">${'★'.repeat(Math.round(p.rating))}${'☆'.repeat(5-Math.round(p.rating))} ${p.rating}</div>
        <div class="card-footer">
          <div class="card-price">
            ₹${p.price.toLocaleString()}
            ${p.old ? `<div class="old">₹${p.old.toLocaleString()}</div>` : ''}
          </div>
          <button class="add-btn" onclick="event.stopPropagation(); addToCart(${p.id})">+ Add</button>
        </div>
      </div>
    </div>
  `).join('');
}

// ── DETAIL ────────────────────────────────────────────────────────────────────
function renderDetail(id) {
  const p = PRODUCTS.find(x => x.id === id);
  if (!p) return;
  const bg = {'Electronics':'#eef2ff','Fashion':'#fdf2f8','Home':'#f0fdf4','Sports':'#fff7ed','Books & Art':'#fffbeb'}[p.cat] || '#f8f8f8';
  const discount = p.old ? Math.round((1 - p.price/p.old)*100) : null;

  document.getElementById('detail-content').innerHTML = `
    <div class="detail-img" style="background:${bg}">${p.emoji}</div>
    <div class="detail-info">
      <div class="detail-cat">${p.cat} ${discount ? `· <span style="color:var(--accent)">${discount}% off</span>` : ''}</div>
      <div class="detail-name">${p.name}</div>
      <div class="detail-rating">${'★'.repeat(Math.round(p.rating))}${'☆'.repeat(5-Math.round(p.rating))} ${p.rating} rating</div>
      <div class="detail-price">
        ₹${p.price.toLocaleString()}
        ${p.old ? `<span style="font-size:1rem;color:var(--muted);font-weight:400;text-decoration:line-through;margin-left:8px">₹${p.old.toLocaleString()}</span>` : ''}
      </div>
      <div class="detail-desc">${p.desc}</div>
      <div class="detail-tags">${p.tags.map(t => `<span class="tag">#${t}</span>`).join('')}</div>
      <button class="detail-add" onclick="addToCart(${p.id}); navigate('catalog')">
        🛒 Add to Cart
      </button>
    </div>
  `;
}

// ── CART ──────────────────────────────────────────────────────────────────────
function addToCart(id) {
  cart[id] = (cart[id] || 0) + 1;
  updateCartCount();
  showToast('Added to cart!');
}

function removeFromCart(id) {
  delete cart[id];
  updateCartCount();
  renderCart();
}

function changeQty(id, delta) {
  cart[id] = Math.max(1, (cart[id] || 1) + delta);
  renderCart();
  updateCartCount();
}

function updateCartCount() {
  const total = Object.values(cart).reduce((a,b) => a+b, 0);
  const el = document.getElementById('cart-count');
  el.textContent = total;
  el.classList.add('bump');
  setTimeout(() => el.classList.remove('bump'), 300);
}

function renderCart() {
  const ids = Object.keys(cart).map(Number);
  const content = document.getElementById('cart-content');
  if (!ids.length) {
    content.innerHTML = `<div class="cart-empty"><div style="font-size:3rem">🛒</div><p>Your cart is empty.<br>Go browse something nice!</p><br><button class="hero-cta" onclick="navigate('catalog')" style="margin:0 auto">Browse Catalog →</button></div>`;
    return;
  }

  const items = ids.map(id => {
    const p = PRODUCTS.find(x => x.id === id);
    const qty = cart[id];
    return `
      <div class="cart-item">
        <div class="cart-item-icon">${p.emoji}</div>
        <div class="cart-item-info">
          <div class="cart-item-name">${p.name}</div>
          <div class="cart-item-cat">${p.cat}</div>
        </div>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="changeQty(${id},-1)">−</button>
          <span class="qty-num">${qty}</span>
          <button class="qty-btn" onclick="changeQty(${id},1)">+</button>
        </div>
        <div class="cart-item-price">₹${(p.price * qty).toLocaleString()}</div>
        <button class="remove-btn" onclick="removeFromCart(${id})" title="Remove">✕</button>
      </div>
    `;
  }).join('');

  const subtotal = ids.reduce((sum, id) => sum + PRODUCTS.find(x => x.id===id).price * cart[id], 0);
  const shipping = subtotal >= 999 ? 0 : 99;
  const total = subtotal + shipping;

  content.innerHTML = items + `
    <div class="cart-summary">
      <div class="summary-row"><span>Subtotal</span><span>₹${subtotal.toLocaleString()}</span></div>
      <div class="summary-row"><span>Shipping</span><span>${shipping === 0 ? '<span style="color:var(--success)">Free</span>' : '₹' + shipping}</span></div>
      <div class="summary-total"><span>Total</span><span>₹${total.toLocaleString()}</span></div>
      <button class="checkout-btn" onclick="handleCheckout()">Proceed to Checkout →</button>
    </div>
  `;
}

function handleCheckout() {
  cart = {};
  updateCartCount();
  showToast('🎉 Order placed! Thank you.');
  renderCart();
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
buildFilters();
</script>
</body>
</html>
